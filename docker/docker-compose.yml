name: realtimeplatform

# ─────────────────────────────────────────────────────────────────────────────
# PERFILES:
#   core          → pipeline mínimo: postgres, kafka, debezium, spark, generator
#   monitoring    → kafka-ui, debezium-ui, pgadmin
#   orchestration → airflow
#   viz           → superset
#
# Ejemplos:
#   docker compose --profile core up -d
#   docker compose --profile core --profile monitoring up -d
#   docker compose --profile core --profile orchestration up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Fuente de datos ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: realtimeplatform-postgres
    profiles: [core]
    environment:
      POSTGRES_DB:       crypto
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=4
        -c max_wal_senders=4
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Generador de datos Binance → PostgreSQL ───────────────────────────────────

  generator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.generator
    container_name: realtimeplatform-generator
    profiles: [core]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       crypto
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped

  # ── Kafka stack ───────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: realtimeplatform-zookeeper
    profiles: [core]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: realtimeplatform-kafka
    profiles: [core]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: realtimeplatform-kafka-ui
    profiles: [monitoring]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:             local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── CDC ───────────────────────────────────────────────────────────────────────

  debezium:
    image: debezium/connect:2.4
    container_name: realtimeplatform-debezium
    profiles: [core]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS:                      kafka:29092
      GROUP_ID:                               debezium-group
      CONFIG_STORAGE_TOPIC:                   debezium_configs
      OFFSET_STORAGE_TOPIC:                   debezium_offsets
      STATUS_STORAGE_TOPIC:                   debezium_statuses
      KEY_CONVERTER:                          org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER:                        org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE:   "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  connector-init:
    image: curlimages/curl:latest
    container_name: realtimeplatform-connector-init
    profiles: [core]
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ../scripts/register_connector.sh:/register_connector.sh
      - ./debezium-connector.json:/connector.json
    entrypoint: ["/bin/sh", "/register_connector.sh"]
    restart: "no"

  debezium-ui:
    image: debezium/debezium-ui:latest
    container_name: realtimeplatform-debezium-ui
    profiles: [monitoring]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CONNECT_URIS: http://debezium:8083

  # ── Spark cluster (Master + Worker + Streaming job) ──────────────────────────

  spark:
    build:
      context: ..
      dockerfile: docker/Dockerfile.spark
    container_name: realtimeplatform-spark
    profiles: [core]
    mem_limit: 3g
    command: >
      /opt/spark/bin/spark-submit
        --master local[2]
        --driver-memory 1g
        --packages io.delta:delta-spark_2.12:3.1.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
        --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
        --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
        --conf spark.sql.shuffle.partitions=2
        /app/main.py
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DELTA_LAKE_PATH:         /data/lakehouse
      CHECKPOINT_BASE:         /data/checkpoints
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_PREFIX:      dbserver1.public
    volumes:
      - lakehouse_data:/data/lakehouse
      - checkpoints_data:/data/checkpoints
    restart: unless-stopped

  # ── Visualización ─────────────────────────────────────────────────────────────

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: realtimeplatform-superset
    profiles: [viz]
    user: root
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: realtimeplatform_superset_secret
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - superset_data:/app/superset_home
      - lakehouse_data:/lakehouse

  # ── Monitorización pgAdmin ────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: realtimeplatform-pgadmin
    profiles: [monitoring]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── Orquestación Airflow ──────────────────────────────────────────────────────

  airflow-postgres:
    image: postgres:15
    container_name: realtimeplatform-airflow-postgres
    profiles: [orchestration]
    environment:
      POSTGRES_DB:       airflow
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: realtimeplatform-airflow-init
    profiles: [orchestration]
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:  postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR:              LocalExecutor
      _AIRFLOW_DB_MIGRATE:                  "true"
      _AIRFLOW_WWW_USER_CREATE:             "true"
      _AIRFLOW_WWW_USER_USERNAME:           admin
      _AIRFLOW_WWW_USER_PASSWORD:           admin123
    command: version
    volumes:
      - ../dags:/opt/airflow/dags

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: realtimeplatform-airflow-webserver
    profiles: [orchestration]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:           postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR:                       LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY:                realtimeplatform_secret
      AIRFLOW__WEBSERVER__WORKERS:                    1
      AIRFLOW__WEBSERVER__WORKER_CLASS:               gevent
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT:  300
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT:  300
      AIRFLOW__CORE__LAZY_LOAD_PLUGINS:               True
      AIRFLOW__CORE__LAZY_DISCOVER_PROVIDERS:         True
    command: webserver
    volumes:
      - ../dags:/opt/airflow/dags

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: realtimeplatform-airflow-scheduler
    profiles: [orchestration]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:    postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR:                LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY:         realtimeplatform_secret
      AIRFLOW__CORE__LAZY_LOAD_PLUGINS:       True
      AIRFLOW__CORE__LAZY_DISCOVER_PROVIDERS: True
    command: scheduler
    volumes:
      - ../dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - lakehouse_data:/data/lakehouse

volumes:
  postgres_data:
  pgadmin_data:
  airflow_postgres_data:
  superset_data:
  lakehouse_data:
  checkpoints_data:
